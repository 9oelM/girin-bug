<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XRPL WalletConnect — mptAuthorize Bug Repro</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: monospace;
      max-width: 640px;
      margin: 2rem auto;
      padding: 1rem;
      background: #fff;
      color: #111;
    }
    h1 { font-size: 1.2rem; }
    p { color: #555; font-size: 0.9rem; }
    button {
      margin: 0.25rem 0.25rem 0.25rem 0;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-family: monospace;
    }
    button:disabled { opacity: 0.35; cursor: default; }
    input[type="text"] {
      display: block;
      width: 100%;
      padding: 0.4rem 0.5rem;
      margin: 0.4rem 0 0.75rem;
      font-family: monospace;
      font-size: 0.85rem;
      border: 1px solid #ccc;
    }
    label { font-size: 0.9rem; font-weight: bold; }
    #account-info { margin: 0.6rem 0; color: #006600; font-size: 0.9rem; min-height: 1.2em; }
    #status { margin: 0.4rem 0; font-weight: bold; font-size: 0.9rem; min-height: 1.2em; }
    hr { margin: 1.25rem 0; border: none; border-top: 1px solid #ddd; }
    #result-banner {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 4px;
    }
    #result-banner.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    #result-banner.failure { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    pre#result {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 0.75rem;
      margin-top: 0.5rem;
      overflow-x: auto;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 2rem;
    }
  </style>
</head>
<body>
  <h1>mptAuthorize Bug Repro</h1>
  <p>
    Reproduces the Girin Wallet crash when sending an <code>MPTokenAuthorize</code>
    transaction via WalletConnect on XRPL.
  </p>

  <div>
    <button id="btn-connect">Connect Wallet</button>
    <button id="btn-disconnect" disabled>Disconnect</button>
  </div>

  <div id="account-info">Not connected</div>
  <div id="status"></div>

  <hr />

  <label for="issuance-id">MPTokenIssuanceID</label>
  <input
    id="issuance-id"
    type="text"
    placeholder="e.g. 00070C44EB593B13CB85C7E55D01E55F0EDF8FE4"
    value="00070C44EB593B13CB85C7E55D01E55F0EDF8FE4"
  />

  <label for="holder-addr">
    Holder Account
    <small style="font-weight:normal;color:#777"> (leave blank to self-authorize)</small>
  </label>
  <input
    id="holder-addr"
    type="text"
    placeholder="rHolder... (optional)"
  />

  <button id="btn-send" disabled>Send MPTokenAuthorize</button>

  <div id="result-banner"></div>
  <pre id="result"></pre>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
